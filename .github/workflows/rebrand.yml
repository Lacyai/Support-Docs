name: Rebrand Documentation

on:
  workflow_dispatch:
    inputs:
      brand_name:
        description: 'Your brand name (e.g., "MyCompany")'
        required: true
        type: string
      primary_color:
        description: 'Primary color hex (e.g., "#3B82F6")'
        required: true
        type: string
        default: "#3B82F6"
      website_url:
        description: 'Your website URL (e.g., "https://mycompany.com")'
        required: true
        type: string
      dashboard_url:
        description: 'Your dashboard URL (e.g., "https://app.mycompany.com") - API URL will be derived as dashboard_url/api/'
        required: true
        type: string
      support_url:
        description: 'Your support page URL (e.g., "https://mycompany.com/contact")'
        required: true
        type: string
      linkedin_url:
        description: "Your LinkedIn company URL (optional, leave empty to remove)"
        required: false
        type: string
      og_image_url:
        description: "Your OG image URL for social sharing (optional)"
        required: false
        type: string

jobs:
  rebrand:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 1: URL replacements (most specific first to avoid partial matches)
      - name: Replace app.lacy.ai URLs
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "https://app.lacy.ai"
          replace: "${{ inputs.dashboard_url }}"
          include: "**/*.{json,mdx,md}"

      - name: Replace support URL
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "https://lacy.ai/contact"
          replace: "${{ inputs.support_url }}"
          include: "**/*.{json,mdx,md}"

      - name: Replace OG image URL
        if: ${{ inputs.og_image_url != '' }}
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "https://lacy.ai/ogimage-en.jpg"
          replace: "${{ inputs.og_image_url }}"
          include: "**/*.{json,mdx,md}"

      - name: Replace website URL
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "https://lacy.ai"
          replace: "${{ inputs.website_url }}"
          include: "**/*.{json,mdx,md}"

      - name: Replace API baseUrl in mint.json
        run: |
          # Replace the API baseUrl with dashboard_url + /api/
          sed -i 's|"baseUrl": "https://app.lacy.ai/api/"|"baseUrl": "${{ inputs.dashboard_url }}/api/"|g' mint.json

      - name: Replace all URLs in mint.json explicitly
        run: |
          # Replace URLs in mint.json using sed (more reliable than glob patterns)
          sed -i 's|https://app.lacy.ai|${{ inputs.dashboard_url }}|g' mint.json
          sed -i 's|https://lacy.ai/contact|${{ inputs.support_url }}|g' mint.json
          sed -i 's|https://lacy.ai|${{ inputs.website_url }}|g' mint.json
          sed -i 's|"name": "lacy"|"name": "${{ inputs.brand_name }}"|g' mint.json

      - name: Replace additional lacy URLs in all files
        run: |
          # Replace recordings URL
          find . -type f \( -name "*.mdx" -o -name "*.md" -o -name "*.json" \) -exec sed -i 's|https://recordings.lacy.ai|${{ inputs.dashboard_url }}/recordings|g' {} \;
          # Replace automation URL
          find . -type f \( -name "*.mdx" -o -name "*.md" -o -name "*.json" \) -exec sed -i 's|https://automation.lacy.ai|${{ inputs.dashboard_url }}/automation|g' {} \;
          # Replace automate URL  
          find . -type f \( -name "*.mdx" -o -name "*.md" -o -name "*.json" \) -exec sed -i 's|https://automate.lacy.ai|${{ inputs.dashboard_url }}/automate|g' {} \;
          # Replace api.lacy.ai
          find . -type f \( -name "*.mdx" -o -name "*.md" -o -name "*.json" \) -exec sed -i 's|https://api.lacy.ai|${{ inputs.dashboard_url }}|g' {} \;

      - name: Replace LinkedIn URL
        if: ${{ inputs.linkedin_url != '' }}
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "https://www.linkedin.com/company/lacy-ai"
          replace: "${{ inputs.linkedin_url }}"
          include: "**/*.json"

      - name: Remove LinkedIn if not provided
        if: ${{ inputs.linkedin_url == '' }}
        run: |
          # Remove the linkedin line from mint.json if no URL provided
          sed -i '/"linkedin":/d' mint.json

      # Step 2: Brand name replacements in prose content
      - name: Replace lacy.ai brand in content
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "lacy.ai"
          replace: "${{ inputs.brand_name }}"
          include: "**/*.{mdx,md}"

      - name: Replace lacy brand in mint.json name
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: '"name": "lacy"'
          replace: '"name": "${{ inputs.brand_name }}"'
          include: "mint.json"

      - name: Replace standalone lacy references
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "the lacy team"
          replace: "the ${{ inputs.brand_name }} team"
          include: "**/*.{mdx,md}"

      - name: Replace lacy system references
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "the lacy system"
          replace: "the ${{ inputs.brand_name }} system"
          include: "**/*.{mdx,md}"

      - name: Replace lacy platform references
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "the lacy platform"
          replace: "the ${{ inputs.brand_name }} platform"
          include: "**/*.{mdx,md}"

      - name: Replace lacy API references
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "lacy API"
          replace: "${{ inputs.brand_name }} API"
          include: "**/*.{mdx,md}"

      - name: Replace lacy account references
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "your lacy account"
          replace: "your ${{ inputs.brand_name }} account"
          include: "**/*.{mdx,md}"

      - name: Replace from lacy references
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "from lacy"
          replace: "from ${{ inputs.brand_name }}"
          include: "**/*.{mdx,md}"

      - name: Replace to lacy references
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "to lacy"
          replace: "to ${{ inputs.brand_name }}"
          include: "**/*.{mdx,md}"

      - name: Replace lacy SIP references
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "lacy SIP"
          replace: "${{ inputs.brand_name }} SIP"
          include: "**/*.{mdx,md}"

      - name: Replace Import to lacy references
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "Import numbers to lacy"
          replace: "Import numbers to ${{ inputs.brand_name }}"
          include: "**/*.{mdx,md}"

      - name: Replace generic standalone lacy in content
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: " lacy "
          replace: " ${{ inputs.brand_name }} "
          include: "**/*.{mdx,md}"

      - name: Replace lacy at end of sentence
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: " lacy."
          replace: " ${{ inputs.brand_name }}."
          include: "**/*.{mdx,md}"

      - name: Replace lacy with comma
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: " lacy,"
          replace: " ${{ inputs.brand_name }},"
          include: "**/*.{mdx,md}"

      # Step 3: Color replacements
      - name: Replace primary color
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "#06df4b"
          replace: "${{ inputs.primary_color }}"
          include: "**/*.{json,mdx}"

      - name: Replace dark/accent color
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "#65fe50"
          replace: "${{ inputs.primary_color }}"
          include: "**/*.{json,mdx}"

      - name: Replace anchor gradient start
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "#01df4a"
          replace: "${{ inputs.primary_color }}"
          include: "**/*.json"

      # Step 4: Rename files with 'lacy' in the name
      - name: Rename what-is-lacy page
        run: |
          if [ -f "introduction/what-is-lacy.mdx" ]; then
            mv introduction/what-is-lacy.mdx introduction/what-is-platform.mdx
          fi

      - name: Update navigation for renamed what-is-lacy
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "introduction/what-is-lacy"
          replace: "introduction/what-is-platform"
          include: "**/*.{json,mdx}"

      - name: Rename lacy-tool page
        run: |
          if [ -f "automation-platform/calls-related/lacy-tool.mdx" ]; then
            mv automation-platform/calls-related/lacy-tool.mdx automation-platform/calls-related/platform-tool.mdx
          fi

      - name: Update navigation for renamed lacy-tool
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "automation-platform/calls-related/lacy-tool"
          replace: "automation-platform/calls-related/platform-tool"
          include: "**/*.{json,mdx}"

      # Step 5: Final comprehensive text replacements using sed
      - name: Final cleanup - replace remaining lacy text
        run: |
          # Replace lacy.ai in all content files
          find . -type f \( -name "*.mdx" -o -name "*.md" \) ! -path "./.git/*" -exec sed -i 's/lacy\.ai/${{ inputs.brand_name }}/g' {} \;
          # Replace standalone lacy (but not in file paths or image references)
          find . -type f \( -name "*.mdx" -o -name "*.md" \) ! -path "./.git/*" -exec sed -i 's/lacy\.ai/${{ inputs.brand_name }}/g' {} \;
          find . -type f \( -name "*.mdx" -o -name "*.md" \) ! -path "./.git/*" -exec sed -i 's/\blacy\b/${{ inputs.brand_name }}/g' {} \;
          # Replace in titles and descriptions
          find . -type f \( -name "*.mdx" -o -name "*.md" \) ! -path "./.git/*" -exec sed -i 's/"lacy"/"${{ inputs.brand_name }}"/g' {} \;
          find . -type f \( -name "*.mdx" -o -name "*.md" \) ! -path "./.git/*" -exec sed -i "s/'lacy'/'${{ inputs.brand_name }}'/g" {} \;

      # Step 6: Save branding config for future updates
      - name: Save branding config
        run: |
          cat > brand.config.json << 'EOF'
          {
            "name": "${{ inputs.brand_name }}",
            "primaryColor": "${{ inputs.primary_color }}",
            "websiteUrl": "${{ inputs.website_url }}",
            "dashboardUrl": "${{ inputs.dashboard_url }}",
            "supportUrl": "${{ inputs.support_url }}",
            "linkedinUrl": "${{ inputs.linkedin_url }}",
            "ogImageUrl": "${{ inputs.og_image_url }}"
          }
          EOF

      # Step 6: Commit all changes
      - name: Commit rebranded docs
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Rebrand documentation to ${{ inputs.brand_name }}" || echo "Nothing to commit"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
